services:
  - type: web
    name: mydiary
    runtime: node
    rootDir: server
    buildCommand: npm install && cd ../client && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # set in Render dashboard
      - key: DIARY_PASSWORD_HASH
        sync: false          # set in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # auto-generated by Render
      - key: JWT_EXPIRES_IN
        value: 30d
